<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MegTeerResults - Shillong Teer Results Today</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --red:#E02020;
  --blue:#1A6EE0;
  --text:#222;
  --muted:#777;
  --border:#eee;
  --bg:#f5f5f5;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}

body{
  background:var(--bg);
  font-family:'Noto Sans',sans-serif;
  color:var(--text);
}

.header{
  background:var(--red);
  text-align:center;
  padding:20px;
  color:#fff;
}
.logo{
  font-family:'Baloo 2',cursive;
  font-size:30px;
  font-weight:800;
}
.tagline{
  font-size:12px;
  opacity:0.8;
}

.nav{
  display:flex;
  overflow-x:auto;
  background:#fff;
  border-bottom:2px solid var(--border);
}
.nav a{
  padding:12px;
  font-size:12px;
  text-decoration:none;
  color:var(--muted);
  font-weight:600;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:16px;
}
.card-header{
  background:var(--blue);
  color:#fff;
  padding:12px;
  font-weight:700;
  text-align:center;
}
.card-body{
  padding:15px;
  text-align:center;
}
.result{
  font-size:28px;
  font-weight:800;
  font-family:'Baloo 2',cursive;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  font-weight:600;
}

.footer{
  text-align:center;
  font-size:11px;
  color:var(--muted);
  margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🎯 MegTeerResults</div>
  <div class="tagline">Shillong · Khanapara · Laitlynkot · Jowai</div>
</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="shillong-teer-result.html">Shillong</a>
  <a href="khanapara-teer-result.html">Khanapara</a>
  <a href="laitlynkot-teer-result.html">Laitlynkot</a>
  <a href="jowai-teer-result.html">Jowai</a>
</div>

<div class="container">

  <div class="card">
    <div class="card-header">Shillong Teer</div>
    <div class="card-body">
      <div class="result" id="sh-result">--</div>
      <a href="shillong-teer-result.html" class="btn">View Result</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Khanapara Teer</div>
    <div class="card-body">
      <div class="result" id="kh-result">--</div>
      <a href="khanapara-teer-result.html" class="btn">View Result</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Laitlynkot Teer</div>
    <div class="card-body">
      <div class="result" id="lt-result">--</div>
      <a href="laitlynkot-teer-result.html" class="btn">View Result</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Jowai Teer</div>
    <div class="card-body">
      <div class="result" id="jw-result">--</div>
      <a href="jowai-teer-result.html" class="btn">View Result</a>
    </div>
  </div>

  <div class="footer">
    Results are for informational purposes only. Play responsibly.
  </div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTb7w4wPmCuJVa0h9hznPAc92ye2hU6sjAhaVXXXRayaft74WXok5tdH7rHETTPyeghXEO_SIK5paZT4/pub?output=csv";

fetch(SHEET_URL)
.then(res => res.text())
.then(data => {
  const rows = data.trim().split("\n");
  rows.shift();

  let lastRow = null;
  for (let i = rows.length - 1; i >= 0; i--) {
    if (rows[i].trim() !== "") {
      lastRow = rows[i];
      break;
    }
  }

  if (!lastRow) return;

  const last = lastRow.split(",");

  document.getElementById("sh-result").textContent = (last[1] || "--") + " - " + (last[2] || "--");
  document.getElementById("kh-result").textContent = (last[4] || "--") + " - " + (last[5] || "--");
  document.getElementById("lt-result").textContent = (last[7] || "--") + " - " + (last[8] || "--");
  document.getElementById("jw-result").textContent = (last[10] || "--") + " | " + (last[11] || "--");
})
.catch(err => console.log(err));
</script>
  
</body>
</html>
