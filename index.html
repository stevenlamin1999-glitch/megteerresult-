<!DOCTYPE html>
<html>
<head>
<title>MegTeerResults</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body{font-family:Arial;background:#f5f5f5;text-align:center}
.card{background:#fff;margin:15px;padding:20px;border-radius:10px}
.result{font-size:28px;font-weight:bold}
a{display:block;margin-top:10px}
</style>
</head>

<body>

<h2>🎯 MegTeerResults</h2>

<div class="card">
Shillong: <div class="result" id="sh-result">--</div>
<a href="shillong-teer-result.html">View</a>
</div>

<div class="card">
Khanapara: <div class="result" id="kh-result">--</div>
<a href="khanapara-teer-result.html">View</a>
</div>

<div class="card">
Laitlynkot: <div class="result" id="lt-result">--</div>
<a href="laitlynkot-teer-result.html">View</a>
</div>

<div class="card">
Jowai: <div class="result" id="jw-result">--</div>
<a href="jowai-teer-result.html">View</a>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTb7w4wPmCuJVa0h9hznPAc92ye2hU6sjAhaVXXXRayaft74WXok5tdH7rHETTPyeghXEO_SIK5paZT4/pub?output=csv";

fetch(SHEET_URL)
.then(res => res.text())
.then(data => {
  const rows = data.trim().split("\n");

  // Remove header row
  rows.shift();

  // Get LAST FILLED ROW (important fix)
  let lastRow = null;
  for (let i = rows.length - 1; i >= 0; i--) {
    if (rows[i].trim() !== "") {
      lastRow = rows[i];
      break;
    }
  }

  if (!lastRow) return;

  const cols = lastRow.split(",");

  // CORRECT COLUMN MAPPING
  const shFR = cols[1];
  const shSR = cols[2];

  const khFR = cols[3];
  const khSR = cols[4];

  const ltFR = cols[5];
  const ltSR = cols[6];

  const jwJ  = cols[8];
  const jwL  = cols[9];

  // DISPLAY (with safety fallback)
  document.getElementById("sh-result").textContent =
    (shFR || "--") + " - " + (shSR || "--");

  document.getElementById("kh-result").textContent =
    (khFR || "--") + " - " + (khSR || "--");

  document.getElementById("lt-result").textContent =
    (ltFR || "--") + " - " + (ltSR || "--");

  document.getElementById("jw-result").textContent =
    (jwJ || "--") + " | " + (jwL || "--");
})
.catch(err => console.log("Error:", err));
</script>

</body>
</html>
