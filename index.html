<!DOCTYPE html>
<html>
<head>
<title>MegTeerResults</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body{font-family:Arial;background:#f5f5f5;text-align:center}
.card{background:#fff;margin:15px;padding:20px;border-radius:10px}
.result{font-size:28px;font-weight:bold}
a{display:block;margin-top:10px}
</style>
</head>

<body>

<h2>🎯 MegTeerResults</h2>

<div class="card">
Shillong: <div class="result" id="sh-result">--</div>
<a href="shillong-teer-result.html">View</a>
</div>

<div class="card">
Khanapara: <div class="result" id="kh-result">--</div>
<a href="khanapara-teer-result.html">View</a>
</div>

<div class="card">
Laitlynkot: <div class="result" id="lt-result">--</div>
<a href="laitlynkot-teer-result.html">View</a>
</div>

<div class="card">
Jowai: <div class="result" id="jw-result">--</div>
<a href="jowai-teer-result.html">View</a>
</div>

<script>
const SHEET_URL = "PASTE YOUR GOOGLE SHEET CSV LINK HERE";

fetch(SHEET_URL)
.then(res=>res.text())
.then(data=>{
  const rows=data.trim().split("\n");
  rows.shift();
  const valid=rows.filter(r=>r.trim()!="");
  const last=valid[valid.length-1].split(",");

  document.getElementById("sh-result").textContent=last[1]+"-"+last[2];
  document.getElementById("kh-result").textContent=last[3]+"-"+last[4];
  document.getElementById("lt-result").textContent=last[5]+"-"+last[6];
  document.getElementById("jw-result").textContent=last[8]+"|"+last[9];
});
</script>

</body>
</html>
