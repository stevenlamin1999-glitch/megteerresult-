<!DOCTYPE html>
<html>
<head>
<title>Laitlynkot Teer Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body{text-align:center;font-family:sans-serif;background:#f5f5f5}
.card{background:#fff;padding:20px;margin:20px;border-radius:10px}
.num{font-size:40px;font-weight:bold}
</style>
</head>

<body>

<h2>Laitlynkot Teer Result</h2>

<div class="card">
  <div>FR</div>
  <div class="num" id="fr">--</div>
</div>

<div class="card">
  <div>SR</div>
  <div class="num" id="sr">--</div>
</div>

<div class="card">
  <div>TR</div>
  <div class="num" id="tr">--</div>
</div>

<script>
var d = JSON.parse(localStorage.getItem("megteer_results")||"{}");
var k = Object.keys(d).sort().reverse()[0];
if(k){
  document.getElementById("fr").textContent = d[k].ltFR || "--";
  document.getElementById("sr").textContent = d[k].ltSR || "--";
  document.getElementById("tr").textContent = d[k].ltTR || "--";
}
</script>

</body>
</html>
