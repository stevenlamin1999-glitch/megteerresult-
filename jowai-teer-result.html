<!DOCTYPE html>
<html>
<head>
<title>Jowai & Ladrymbai Teer Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
body{text-align:center;font-family:sans-serif;background:#f5f5f5}
.card{background:#fff;padding:20px;margin:20px;border-radius:10px}
.num{font-size:40px;font-weight:bold}
</style>
</head>

<body>

<h2>Jowai & Ladrymbai Result</h2>

<div class="card">
  <div>Jowai (JW-J)</div>
  <div class="num" id="jw">--</div>
</div>

<div class="card">
  <div>Ladrymbai (JW-L)</div>
  <div class="num" id="jl">--</div>
</div>

<script>
var d = JSON.parse(localStorage.getItem("megteer_results")||"{}");
var k = Object.keys(d).sort().reverse()[0];
if(k){
  document.getElementById("jw").textContent = d[k].jwJ || "--";
  document.getElementById("jl").textContent = d[k].jwL || "--";
}
</script>

</body>
</html>
